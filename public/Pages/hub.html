<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NEXUS GAMES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#04050a;--surface:#0a0d18;--surface2:#111527;--border:#1e2540;--accent:#00f5c8;--accent2:#7c3aed;--accent3:#f59e0b;--text:#e2e8f0;--text-muted:#64748b;--danger:#ef4444;}
    :root.light{--bg:#f0f2f8;--surface:#ffffff;--surface2:#e8ecf5;--border:#d0d7e8;--accent:#0099a8;--accent2:#6d28d9;--accent3:#d97706;--text:#1a1f36;--text-muted:#6b7a99;--danger:#dc2626;}
    :root.light body::before{background-image:linear-gradient(rgba(0,153,168,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,153,168,0.06) 1px,transparent 1px);}
    :root.light header{background:rgba(240,242,248,0.9);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,200,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,200,0.025) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 25s linear infinite;pointer-events:none;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:60px 60px}}
    .scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}

    header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(4,5,10,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:0.4em;color:var(--accent);display:flex;align-items:center;gap:10px;}
    .logo::before{content:'';width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 12px var(--accent);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .header-right{display:flex;align-items:center;gap:16px;}
    .user-info{display:flex;align-items:center;gap:12px;}
    .avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:white;}
    .user-name{font-size:14px;font-weight:500;}

    /* Lang toggle in header */
    .lang-toggle{display:flex;gap:4px;}
    .lang-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 11px;border-radius:6px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
    .lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,245,200,0.08);}

    .logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:8px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--danger);color:var(--danger);}

    main{padding-top:64px;min-height:100vh;}
    .hero-section{padding:80px 48px 60px;max-width:1200px;margin:0 auto;}
    .welcome-text{font-size:13px;font-family:'Orbitron',monospace;letter-spacing:0.3em;color:var(--text-muted);margin-bottom:16px;}
    .page-title{font-family:'Orbitron',monospace;font-size:clamp(36px,4vw,56px);font-weight:900;line-height:1;margin-bottom:16px;}
    .page-title span{color:var(--accent);}
    .page-subtitle{color:var(--text-muted);font-size:15px;}

    .games-section{padding:0 48px 80px;max-width:1200px;margin:0 auto;}
    .section-label{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:0.3em;color:var(--text-muted);margin-bottom:24px;display:flex;align-items:center;gap:12px;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
    .games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;}

    .game-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform 0.3s,border-color 0.3s,box-shadow 0.3s;cursor:pointer;text-decoration:none;display:block;position:relative;}
    .game-card:hover{transform:translateY(-6px);}
    .game-card.chess:hover{border-color:var(--accent);box-shadow:0 20px 60px rgba(0,245,200,0.1);}
    .game-card.rogue:hover{border-color:var(--accent2);box-shadow:0 20px 60px rgba(124,58,237,0.1);}
    .game-card.locked{cursor:default;opacity:0.7;}
    .game-card.locked:hover{transform:none;box-shadow:none;}
    .card-banner{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .chess .card-banner{background:linear-gradient(135deg,#0d1f2d 0%,#0a3d4f 50%,#051822 100%);}
    .rogue .card-banner{background:linear-gradient(135deg,#1a0a2e 0%,#2d1060 50%,#0f0520 100%);}
    .banner-icon{font-size:72px;filter:drop-shadow(0 0 30px rgba(0,245,200,0.4));animation:float 4s ease-in-out infinite;}
    .rogue .banner-icon{filter:drop-shadow(0 0 30px rgba(124,58,237,0.5));}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .banner-particles{position:absolute;inset:0;overflow:hidden;}
    .particle{position:absolute;width:2px;height:2px;border-radius:50%;animation:rise linear infinite;}
    .chess .particle{background:var(--accent);}
    .rogue .particle{background:var(--accent2);}
    @keyframes rise{0%{transform:translateY(200px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20px);opacity:0}}
    .card-status{position:absolute;top:16px;right:16px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.15em;padding:5px 10px;border-radius:6px;}
    .status-online{background:rgba(0,245,200,0.15);color:var(--accent);border:1px solid rgba(0,245,200,0.3);}
    .status-soon{background:rgba(245,158,11,0.15);color:var(--accent3);border:1px solid rgba(245,158,11,0.3);}
    .card-body{padding:28px;}
    .card-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;margin-bottom:10px;}
    .chess .card-title{color:var(--accent);}
    .rogue .card-title{color:var(--accent2);}
    .card-desc{color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:24px;}
    .card-stats{display:flex;gap:24px;margin-bottom:24px;}
    .stat{display:flex;flex-direction:column;gap:2px;}
    .stat-value{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;}
    .chess .stat-value{color:var(--accent);}
    .rogue .stat-value{color:var(--accent2);}
    .stat-label{font-size:11px;color:var(--text-muted);}
    .play-btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:0.2em;cursor:pointer;transition:all 0.2s;}
    .chess .play-btn{background:linear-gradient(135deg,var(--accent),#00c9a7);color:var(--bg);}
    .chess .play-btn:hover{box-shadow:0 8px 24px rgba(0,245,200,0.35);transform:translateY(-1px);}
    .rogue .play-btn{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);cursor:not-allowed;}

    .stats-section{padding:0 48px 80px;max-width:1200px;margin:0 auto;}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;}
    .stat-card-value{font-family:'Orbitron',monospace;font-size:32px;font-weight:700;color:var(--accent);margin-bottom:6px;}
    .stat-card-label{font-size:13px;color:var(--text-muted);}

    @media(max-width:768px){
      header{padding:0 24px;}
      .hero-section,.games-section,.stats-section{padding-left:24px;padding-right:24px;}
      .stats-grid{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <header>
    <div class="logo">NEXUS GAMES</div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnKO" onclick="setLang('ko')">KO</button>
        <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
        <div style="width:1px;background:var(--border);margin:0 4px;align-self:stretch;"></div>
        <button class="lang-btn" id="btnTheme" onclick="toggleTheme()" title="테마 전환">🌙</button>
      </div>
      <div class="user-info">
        <div class="avatar" id="avatarEl">?</div>
        <span class="user-name" id="nicknameEl">...</span>
      </div>
      <button class="logout-btn" id="logoutBtn" onclick="logout()"></button>
    </div>
  </header>

  <main>
    <div class="hero-section">
      <div class="welcome-text" id="welcomeText"></div>
      <h1 class="page-title" id="pageTitle"></h1>
      <p class="page-subtitle" id="pageSubtitle"></p>
    </div>

    <div class="games-section">
      <div class="section-label">GAME SELECT</div>
      <div class="games-grid">

        <a class="game-card chess" href="chess.html">
          <div class="card-banner">
            <div class="banner-particles" id="chessParticles"></div>
            <div class="banner-icon">♟</div>
            <div class="card-status status-online">● ONLINE</div>
          </div>
          <div class="card-body">
            <div class="card-title">CHESS</div>
            <p class="card-desc" id="chessDesc"></p>
            <div class="card-stats">
              <div class="stat">
                <div class="stat-value" id="chessPlayers">—</div>
                <div class="stat-label" id="labelOnline"></div>
              </div>
              <div class="stat">
                <div class="stat-value" id="myChessWins">—</div>
                <div class="stat-label" id="labelMyWins"></div>
              </div>
            </div>
            <button class="play-btn" id="chessPlayBtn"></button>
          </div>
        </a>

        <div class="game-card rogue locked">
          <div class="card-banner">
            <div class="banner-particles" id="rogueParticles"></div>
            <div class="banner-icon">⚔️</div>
            <div class="card-status status-soon" id="rogueBadge"></div>
          </div>
          <div class="card-body">
            <div class="card-title">ROGUELIKE</div>
            <p class="card-desc" id="rogueDesc"></p>
            <div class="card-stats">
              <div class="stat">
                <div class="stat-value" style="color:var(--accent2)">—</div>
                <div class="stat-label" id="labelFloor"></div>
              </div>
              <div class="stat">
                <div class="stat-value" style="color:var(--accent2)">—</div>
                <div class="stat-label" id="labelRuns"></div>
              </div>
            </div>
            <button class="play-btn" disabled id="roguePlayBtn"></button>
          </div>
        </div>

      </div>
    </div>

    <div class="stats-section">
      <div class="section-label" id="myStatsLabel"></div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-value" id="totalGames">0</div>
          <div class="stat-card-label" id="labelTotalGames"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="totalWins">0</div>
          <div class="stat-card-label" id="labelTotalWins"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="winRate">0%</div>
          <div class="stat-card-label" id="labelWinRate"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="playDays">0</div>
          <div class="stat-card-label" id="labelPlayDays"></div>
        </div>
      </div>
    </div>
  </main>

<script>
// ══════════════════════════════════════════
//  i18n
// ══════════════════════════════════════════
const STRINGS = {
  ko: {
    welcomeText:    'WELCOME BACK',
    pageTitle:      '어떤 게임을\n플레이할까요?',
    pageTitleAccent:'플레이',
    pageSubtitle:   '게임을 선택하고 새로운 도전을 시작하세요.',
    chessDesc:      '수천 년의 역사를 가진 전략 게임. 상대의 킹을 체크메이트하세요.',
    rogueDesc:      '절차적으로 생성된 던전을 탐험하세요. 매 플레이마다 새로운 경험이 펼쳐집니다.',
    rogueBadge:     '개발 중',
    labelOnline:    '온라인 플레이어',
    labelMyWins:    '내 승리',
    labelFloor:     '최고 층수',
    labelRuns:      '총 플레이',
    chessPlayBtn:   '게임 시작 →',
    roguePlayBtn:   '곧 출시됩니다',
    myStatsLabel:   'MY STATS',
    labelTotalGames:'총 게임 수',
    labelTotalWins: '총 승리',
    labelWinRate:   '승률',
    labelPlayDays:  '플레이 일수',
    logoutBtn:      '로그아웃',
  },
  en: {
    welcomeText:    'WELCOME BACK',
    pageTitle:      'What will you\nplay today?',
    pageTitleAccent:'play',
    pageSubtitle:   'Choose a game and start a new challenge.',
    chessDesc:      'A strategy game with thousands of years of history. Checkmate your opponent\'s king.',
    rogueDesc:      'Explore procedurally generated dungeons. A new experience every run.',
    rogueBadge:     'IN DEV',
    labelOnline:    'Online players',
    labelMyWins:    'My wins',
    labelFloor:     'Best floor',
    labelRuns:      'Total runs',
    chessPlayBtn:   'PLAY NOW →',
    roguePlayBtn:   'COMING SOON',
    myStatsLabel:   'MY STATS',
    labelTotalGames:'Total games',
    labelTotalWins: 'Total wins',
    labelWinRate:   'Win rate',
    labelPlayDays:  'Days played',
    logoutBtn:      'LOGOUT',
  }
};

let lang = localStorage.getItem('nexus_lang') || 'ko';
const t = k => STRINGS[lang][k] ?? k;

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('btnKO').classList.toggle('active', lang === 'ko');
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');

  const set = (id, key) => { const el = document.getElementById(id); if (el) el.textContent = t(key); };

  // Page title with accent span
  const titleEl = document.getElementById('pageTitle');
  if (titleEl) {
    const raw    = t('pageTitle');
    const accent = t('pageTitleAccent');
    const lines  = raw.split('\n');
    titleEl.innerHTML = lines.map(line =>
      line.includes(accent) ? line.replace(accent, `<span>${accent}</span>`) : line
    ).join('<br>');
  }

  set('welcomeText',    'welcomeText');
  set('pageSubtitle',   'pageSubtitle');
  set('chessDesc',      'chessDesc');
  set('rogueDesc',      'rogueDesc');
  set('rogueBadge',     'rogueBadge');
  set('labelOnline',    'labelOnline');
  set('labelMyWins',    'labelMyWins');
  set('labelFloor',     'labelFloor');
  set('labelRuns',      'labelRuns');
  set('chessPlayBtn',   'chessPlayBtn');
  set('roguePlayBtn',   'roguePlayBtn');
  set('myStatsLabel',   'myStatsLabel');
  set('labelTotalGames','labelTotalGames');
  set('labelTotalWins', 'labelTotalWins');
  set('labelWinRate',   'labelWinRate');
  set('labelPlayDays',  'labelPlayDays');
  set('logoutBtn',      'logoutBtn');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('nexus_lang', l);
  applyLang();
}

// ══════════════════════════════════════════
//  App
// ══════════════════════════════════════════
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || 'null');
if (!token || !user) window.location.href = '/index.html';

document.getElementById('nicknameEl').textContent = user?.nickname || 'Player';
document.getElementById('avatarEl').textContent   = (user?.nickname || 'P')[0].toUpperCase();

function makeParticles(id) {
  const c = document.getElementById(id);
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*5}s;opacity:${0.3+Math.random()*0.7}`;
    c.appendChild(p);
  }
}
makeParticles('chessParticles');
makeParticles('rogueParticles');

async function loadStats() {
  try {
    const res  = await fetch('/api/stats', { headers:{'Authorization':`Bearer ${token}`} });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    document.getElementById('chessPlayers').textContent = data.onlinePlayers ?? '—';
    document.getElementById('myChessWins').textContent  = data.chessWins     ?? 0;
    document.getElementById('totalGames').textContent   = data.totalGames    ?? 0;
    document.getElementById('totalWins').textContent    = data.totalWins     ?? 0;
    document.getElementById('winRate').textContent      = data.winRate       ?? '0%';
    document.getElementById('playDays').textContent     = data.playDays      ?? 0;
  } catch {}
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  window.location.href = '/index.html';
}

// ── Theme ──────────────────────────────────────────
function applyTheme() {
  const theme = localStorage.getItem('nexus_theme') || 'dark';
  document.documentElement.classList.toggle('light', theme === 'light');
  document.getElementById('btnTheme').textContent = theme === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const next = (localStorage.getItem('nexus_theme') || 'dark') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('nexus_theme', next);
  applyTheme();
}

loadStats();
applyLang();
applyTheme();
</script>
</body>
</html>
