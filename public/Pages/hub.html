<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NEXUS GAMES - HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#04050a;--surface:#0a0d18;--surface2:#111527;--border:#1e2540;--accent:#00f5c8;--accent2:#7c3aed;--accent3:#f59e0b;--text:#e2e8f0;--text-muted:#64748b;--danger:#ef4444;}
    :root.light{--bg:#f0f2f8;--surface:#ffffff;--surface2:#e8ecf5;--border:#d0d7e8;--accent:#0099a8;--accent2:#6d28d9;--accent3:#d97706;--text:#1a1f36;--text-muted:#6b7a99;--danger:#dc2626;}
    * {margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,200,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,200,0.025) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 25s linear infinite;pointer-events:none;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:60px 60px}}
    
    header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(4,5,10,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:0.4em;color:var(--accent);display:flex;align-items:center;gap:10px;}
    .header-right{display:flex;align-items:center;gap:16px;}
    .user-info{display:flex;align-items:center;gap:12px;}
    .avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:white;}
    .logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:8px;font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--danger);color:var(--danger);}

    main{padding-top:64px;min-height:100vh;}
    .hero-section{padding:80px 48px 60px;max-width:1200px;margin:0 auto;}
    .page-title{font-family:'Orbitron',monospace;font-size:clamp(36px,4vw,56px);font-weight:900;line-height:1;margin-bottom:16px;}
    .page-title span{color:var(--accent);}
    
    .games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;padding:0 48px 80px;max-width:1200px;margin:0 auto;}
    .game-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all 0.3s;cursor:pointer;text-decoration:none;display:block;}
    .game-card:hover{transform:translateY(-6px);border-color:var(--accent);}
    .card-body{padding:28px;}
    .play-btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),#00c9a7);color:var(--bg);}
    
    /* 🔴 초기 로딩 시 깜빡임 방지용 */
    body { visibility: hidden; }
    body.ready { visibility: visible; }
  </style>
</head>
<body>
  <header>
    <div class="logo">NEXUS GAMES</div>
    <div class="header-right">
      <div class="user-info">
        <div class="avatar" id="avatarEl">?</div>
        <span class="user-name" id="nicknameEl">...</span>
      </div>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <main>
    <div class="hero-section">
      <div class="welcome-text" id="welcomeText">WELCOME BACK</div>
      <h1 class="page-title" id="pageTitle">SELECT<span> GAME</span></h1>
      <p class="page-subtitle">어떤 모험을 시작하시겠습니까?</p>
    </div>

    <div class="games-grid">
      <a class="game-card" href="/pages/chess.html">
        <div class="card-body">
          <h2 class="card-title" style="color:var(--accent)">CHESS</h2>
          <p style="margin:10px 0 20px; color:var(--text-muted)">전 세계 플레이어와 대결하세요.</p>
          <button class="play-btn">PLAY NOW →</button>
        </div>
      </a>
      
      <a class="game-card" href="/pages/roguelike.html" id="rogueCard">
        <div class="card-body">
          <h2 class="card-title" style="color:var(--accent2)">ROGUELIKE</h2>
          <p style="margin:10px 0 20px; color:var(--text-muted)">나만의 캐릭터로 던전을 탐험하세요.</p>
          <div id="charInfo" style="font-size: 12px; color: var(--accent2); margin-bottom: 10px;">
            </div>
          <button class="play-btn" style="background:var(--surface2); color:var(--text-muted); cursor:default;">COMING SOON</button>
        </div>
      </a>
    </div>
  </main>

<script>
// 1. 보안 및 리다이렉트 관리 (즉시 실행)
(function() {
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');
    
    // 인증 데이터가 없으면 로그인 페이지로 강제 이동
    if (!token || !userStr || userStr === "undefined") {
        window.location.replace('/index.html');
        return;
    }

    try {
        const user = JSON.parse(userStr);
        // 화면 표시 준비 완료
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nicknameEl').textContent = user.nickname || 'Player';
            document.getElementById('avatarEl').textContent = (user.nickname || 'P')[0].toUpperCase();
            document.body.classList.add('ready'); // 화면 표시
        });
    } catch (e) {
        console.error("User data error", e);
        logout();
    }
})();

function logout() {
    localStorage.clear(); // 모든 세션 데이터 삭제
    window.location.replace('/index.html');
}

// 테마 및 기타 기능 (필요시 추가)
</script>
</body>
</html>
