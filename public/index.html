<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS GAMES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#04050a; --surface:#0a0d18; --surface2:#111527; --border:#1e2540;
      --accent:#00f5c8; --accent2:#7c3aed; --accent3:#f59e0b;
      --text:#e2e8f0; --text-muted:#64748b; --danger:#ef4444;
    }
    :root.light{
      --bg:#f0f2f8; --surface:#ffffff; --surface2:#e8ecf5; --border:#d0d7e8;
      --accent:#0099a8; --accent2:#6d28d9; --accent3:#d97706;
      --text:#1a1f36; --text-muted:#6b7a99; --danger:#dc2626;
    }
    :root.light body::before{
      background-image:linear-gradient(rgba(0,153,168,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,153,168,0.06) 1px,transparent 1px);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,200,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,200,0.03) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 20s linear infinite;pointer-events:none;z-index:0;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:60px 60px}}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);opacity:0.15;pointer-events:none;z-index:0;}
    .orb-1{width:600px;height:600px;background:var(--accent2);top:-200px;left:-200px;animation:drift1 15s ease-in-out infinite;}
    .orb-2{width:500px;height:500px;background:var(--accent);bottom:-150px;right:-100px;animation:drift2 18s ease-in-out infinite;}
    @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
    @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
    .scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}

    /* ── Lang toggle ── */
    .lang-toggle{position:fixed;top:20px;right:24px;z-index:100;display:flex;gap:4px;}
    .lang-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);padding:6px 13px;border-radius:6px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
    .lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,245,200,0.08);}

    /* ── Layout ── */
    .layout{position:relative;z-index:1;min-height:100vh;display:grid;grid-template-columns:1fr 420px;}
    .hero{display:flex;flex-direction:column;justify-content:center;padding:80px;}
    .logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:0.4em;color:var(--accent);margin-bottom:60px;display:flex;align-items:center;gap:12px;}
    .logo::before{content:'';width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 16px var(--accent);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .hero-title{font-family:'Orbitron',monospace;font-size:clamp(52px,6vw,88px);font-weight:900;line-height:0.9;margin-bottom:32px;background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-sub{font-size:16px;color:var(--text-muted);line-height:1.7;max-width:480px;margin-bottom:60px;}
    .game-cards{display:flex;gap:16px;}
    .game-card{flex:1;border:1px solid var(--border);background:var(--surface);border-radius:12px;padding:24px;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.3s;}
    .game-card:hover{border-color:var(--accent);transform:translateY(-4px);}
    .game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
    .game-card.chess::before{background:linear-gradient(90deg,var(--accent),transparent);}
    .game-card.rogue::before{background:linear-gradient(90deg,var(--accent2),transparent);}
    .card-icon{font-size:36px;margin-bottom:12px;}
    .card-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:0.2em;color:var(--accent);margin-bottom:6px;}
    .game-card.rogue .card-name{color:var(--accent2);}
    .card-desc{font-size:13px;color:var(--text-muted);line-height:1.5;}
    .badge{position:absolute;top:14px;right:14px;font-size:10px;font-family:'Orbitron',monospace;letter-spacing:0.1em;padding:3px 8px;border-radius:4px;background:rgba(0,245,200,0.1);color:var(--accent);border:1px solid rgba(0,245,200,0.2);}
    .game-card.rogue .badge{background:rgba(124,58,237,0.1);color:var(--accent2);border-color:rgba(124,58,237,0.2);}

    /* ── Auth panel ── */
    .auth-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;padding:60px 48px;position:relative;}
    .auth-panel::before{content:'';position:absolute;top:0;left:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--accent),transparent);}
    .auth-tabs{display:flex;margin-bottom:40px;border-bottom:1px solid var(--border);}
    .tab-btn{flex:1;background:none;border:none;padding:14px 0;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:0.15em;color:var(--text-muted);cursor:pointer;transition:color 0.2s;position:relative;}
    .tab-btn.active{color:var(--accent);}
    .tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);box-shadow:0 0 12px var(--accent);}
    .auth-form{display:none;flex-direction:column;gap:16px;}
    .auth-form.active{display:flex;}
    .form-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;margin-bottom:8px;}
    .form-subtitle{font-size:13px;color:var(--text-muted);margin-bottom:8px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{font-size:11px;font-family:'Orbitron',monospace;letter-spacing:0.15em;color:var(--text-muted);}
    .field input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,245,200,0.08);}
    .field input.error{border-color:var(--danger);}
    .field input.success{border-color:#10b981;}
    .field-hint{font-size:11px;color:var(--text-muted);min-height:16px;transition:color 0.2s;}
    .field-hint.error{color:var(--danger);}
    .field-hint.success{color:#10b981;}
    .submit-btn{background:linear-gradient(135deg,var(--accent) 0%,#00c9a7 100%);border:none;border-radius:8px;padding:14px;color:var(--bg);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:0.2em;cursor:pointer;transition:opacity 0.2s,transform 0.2s,box-shadow 0.2s;margin-top:8px;}
    .submit-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,245,200,0.3);}
    .submit-btn:active{transform:translateY(0);}
    .submit-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
    .alert{padding:12px 16px;border-radius:8px;font-size:13px;display:none;}
    .alert.show{display:block;}
    .alert.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;}
    .alert.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger);}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(4,5,10,0.3);border-top-color:var(--bg);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:900px){
      .layout{grid-template-columns:1fr;}
      .hero{padding:80px 32px 48px;}
      .auth-panel{border-left:none;border-top:1px solid var(--border);padding:48px 32px;}
      .auth-panel::before{display:none;}
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="scanlines"></div>

  <div class="lang-toggle">
    <button class="lang-btn active" id="btnKO" onclick="setLang('ko')">KO</button>
    <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
    <div style="width:1px;background:var(--border);margin:0 4px;align-self:stretch;"></div>
    <button class="lang-btn" id="btnTheme" onclick="toggleTheme()" title="테마 전환">🌙</button>
  </div>

  <div class="layout">
    <!-- Hero -->
    <div class="hero">
      <div class="logo">NEXUS GAMES</div>
      <h1 class="hero-title">GAME<br>HUB</h1>
      <p class="hero-sub" id="heroSub"></p>
      <div class="game-cards">
        <div class="game-card chess">
          <div class="badge">AVAILABLE</div>
          <div class="card-icon">♟</div>
          <div class="card-name">CHESS</div>
          <p class="card-desc" id="chessDesc"></p>
        </div>
        <div class="game-card rogue">
          <div class="badge" id="soonBadge"></div>
          <div class="card-icon">⚔️</div>
          <div class="card-name">ROGUELIKE</div>
          <p class="card-desc" id="rogueDesc"></p>
        </div>
      </div>
    </div>

    <!-- Auth -->
    <div class="auth-panel">
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')"></button>
        <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')"></button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div>
          <div class="form-title"    id="loginTitle"></div>
          <div class="form-subtitle" id="loginSub"></div>
        </div>
        <div id="loginAlert" class="alert"></div>
        <div class="field">
          <label id="labelId"></label>
          <input type="text"     id="loginId" autocomplete="username"         required />
        </div>
        <div class="field">
          <label id="labelPw"></label>
          <input type="password" id="loginPw" autocomplete="current-password" required />
        </div>
        <button class="submit-btn" type="submit" id="loginBtn"></button>
      </form>

      <!-- REGISTER -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div>
          <div class="form-title"    id="registerTitle"></div>
          <div class="form-subtitle" id="registerSub"></div>
        </div>
        <div id="registerAlert" class="alert"></div>
        <div class="field">
          <label id="labelId2"></label>
          <input type="text" id="regId"   autocomplete="off" oninput="checkDuplicate('id',this.value)"       required />
          <span class="field-hint" id="idHint"></span>
        </div>
        <div class="field">
          <label id="labelNick"></label>
          <input type="text" id="regNick" autocomplete="off" oninput="checkDuplicate('nickname',this.value)" required />
          <span class="field-hint" id="nickHint"></span>
        </div>
        <div class="field">
          <label id="labelPw2"></label>
          <input type="password" id="regPw"        autocomplete="new-password" oninput="checkPasswordMatch()" required />
        </div>
        <div class="field">
          <label id="labelPwConfirm"></label>
          <input type="password" id="regPwConfirm" autocomplete="new-password" oninput="checkPasswordMatch()" required />
          <span class="field-hint" id="pwHint"></span>
        </div>
        <button class="submit-btn" type="submit" id="registerBtn"></button>
      </form>
    </div>
  </div>

<script>
// ══════════════════════════════════════════
//  i18n
// ══════════════════════════════════════════
const STRINGS = {
  ko: {
    heroSub:             '전략과 탐험이 만나는 공간.\n체스와 로그라이크를 웹에서 직접 플레이하세요.',
    chessDesc:           '클래식 전략 게임.\n전 세계 플레이어와 대결하세요.',
    rogueDesc:           '매번 새로운 던전.\n끝없는 도전이 기다립니다.',
    soonBadge:           '출시 예정',
    tabLogin:            '로그인',
    tabRegister:         '회원가입',
    loginTitle:          '돌아오셨군요',
    loginSub:            '계정에 로그인하세요',
    registerTitle:       '계정 생성',
    registerSub:         '새로운 모험을 시작하세요',
    labelId:             '아이디',
    labelNick:           '닉네임',
    labelPw:             '비밀번호',
    labelPwConfirm:      '비밀번호 확인',
    phLoginId:           '아이디 입력',
    phLoginPw:           '비밀번호 입력',
    phRegId:             '영문, 숫자 4~20자',
    phNick:              '2~12자',
    phRegPw:             '8자 이상',
    phPwConfirm:         '비밀번호를 다시 입력',
    btnLogin:            '로그인',
    btnRegister:         '계정 만들기',
    errShortId:          '4자 이상 입력하세요',
    errInvalidId:        '영문, 숫자, _만 사용 가능합니다',
    errShortNick:        '2자 이상 입력하세요',
    checking:            '확인 중...',
    available:           '✓ 사용 가능합니다',
    taken:               '✗ 이미 사용 중입니다',
    errNoServer:         '서버에 연결할 수 없습니다',
    errPwMismatch:       '✗ 비밀번호가 일치하지 않습니다',
    okPwMatch:           '✓ 비밀번호가 일치합니다',
    errPwShort:          '비밀번호는 8자 이상이어야 합니다',
    loginLoading:        '로그인 중...',
    registerLoading:     '처리 중...',
    registerSuccess:     '✓ 회원가입 완료! 로그인해주세요.',
    errServerCheck:      '서버에 연결할 수 없습니다. 서버가 실행 중인지 확인하세요.',
  },
  en: {
    heroSub:             'Where strategy meets adventure.\nPlay Chess and Roguelike right in your browser.',
    chessDesc:           'A timeless strategy classic.\nChallenge players from around the world.',
    rogueDesc:           'A new dungeon every run.\nEndless challenges await.',
    soonBadge:           'COMING SOON',
    tabLogin:            'LOGIN',
    tabRegister:         'REGISTER',
    loginTitle:          'Welcome back',
    loginSub:            'Sign in to your account',
    registerTitle:       'Create account',
    registerSub:         'Start a new adventure',
    labelId:             'ID',
    labelNick:           'Nickname',
    labelPw:             'Password',
    labelPwConfirm:      'Confirm password',
    phLoginId:           'Enter your ID',
    phLoginPw:           'Enter your password',
    phRegId:             'Letters, numbers, _ (4–20 chars)',
    phNick:              '2–12 characters',
    phRegPw:             'At least 8 characters',
    phPwConfirm:         'Re-enter your password',
    btnLogin:            'SIGN IN',
    btnRegister:         'CREATE ACCOUNT',
    errShortId:          'Must be at least 4 characters',
    errInvalidId:        'Only letters, numbers and _ allowed',
    errShortNick:        'Must be at least 2 characters',
    checking:            'Checking...',
    available:           '✓ Available',
    taken:               '✗ Already taken',
    errNoServer:         'Cannot connect to server',
    errPwMismatch:       '✗ Passwords do not match',
    okPwMatch:           '✓ Passwords match',
    errPwShort:          'Password must be at least 8 characters',
    loginLoading:        'Signing in...',
    registerLoading:     'Processing...',
    registerSuccess:     '✓ Account created! Please sign in.',
    errServerCheck:      'Cannot connect to server. Make sure the server is running.',
  }
};

let lang = localStorage.getItem('nexus_lang') || 'ko';
const t = k => STRINGS[lang][k] ?? k;

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('btnKO').classList.toggle('active', lang === 'ko');
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');

  const set = (id, key) => { const el = document.getElementById(id); if (el) el.textContent = t(key); };
  const ph  = (id, key) => { const el = document.getElementById(id); if (el) el.placeholder  = t(key); };

  set('heroSub',        'heroSub');
  set('chessDesc',      'chessDesc');
  set('rogueDesc',      'rogueDesc');
  set('soonBadge',      'soonBadge');
  set('tabLogin',       'tabLogin');
  set('tabRegister',    'tabRegister');
  set('loginTitle',     'loginTitle');
  set('loginSub',       'loginSub');
  set('registerTitle',  'registerTitle');
  set('registerSub',    'registerSub');
  set('labelId',        'labelId');
  set('labelId2',       'labelId');
  set('labelNick',      'labelNick');
  set('labelPw',        'labelPw');
  set('labelPw2',       'labelPw');
  set('labelPwConfirm', 'labelPwConfirm');
  set('loginBtn',       'btnLogin');
  set('registerBtn',    'btnRegister');

  ph('loginId',       'phLoginId');
  ph('loginPw',       'phLoginPw');
  ph('regId',         'phRegId');
  ph('regNick',       'phNick');
  ph('regPw',         'phRegPw');
  ph('regPwConfirm',  'phPwConfirm');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('nexus_lang', l);
  applyLang();
}

// ══════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').classList.toggle('active',    tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
}

function showAlert(id, type, msg) { const el = document.getElementById(id); el.className = `alert ${type} show`; el.textContent = msg; }
function hideAlert(id) { document.getElementById(id).className = 'alert'; }

let debounceTimers = {};
function checkDuplicate(field, value) {
  clearTimeout(debounceTimers[field]);
  const hintEl  = document.getElementById(field === 'id' ? 'idHint'   : 'nickHint');
  const inputEl = document.getElementById(field === 'id' ? 'regId'    : 'regNick');
  if (field === 'id') {
    if (value.length < 4)                { hintEl.textContent = t('errShortId');   hintEl.className = 'field-hint error'; inputEl.className = 'error'; return; }
    if (!/^[a-zA-Z0-9_]+$/.test(value)) { hintEl.textContent = t('errInvalidId'); hintEl.className = 'field-hint error'; inputEl.className = 'error'; return; }
  }
  if (field === 'nickname' && value.length < 2) { hintEl.textContent = t('errShortNick'); hintEl.className = 'field-hint error'; inputEl.className = 'error'; return; }
  hintEl.textContent = t('checking'); hintEl.className = 'field-hint';
  debounceTimers[field] = setTimeout(async () => {
    try {
      const data = await (await fetch(`/api/check-duplicate?field=${field}&value=${encodeURIComponent(value)}`)).json();
      if (data.available) { hintEl.textContent = t('available'); hintEl.className = 'field-hint success'; inputEl.className = 'success'; }
      else                { hintEl.textContent = t('taken');     hintEl.className = 'field-hint error';   inputEl.className = 'error'; }
    } catch { hintEl.textContent = t('errNoServer'); hintEl.className = 'field-hint error'; }
  }, 500);
}

function checkPasswordMatch() {
  const pw = document.getElementById('regPw').value;
  const cf = document.getElementById('regPwConfirm').value;
  const hint = document.getElementById('pwHint');
  const inp  = document.getElementById('regPwConfirm');
  if (!cf) { hint.textContent = ''; return; }
  if (pw === cf) { hint.textContent = t('okPwMatch');    hint.className = 'field-hint success'; inp.className = 'success'; }
  else           { hint.textContent = t('errPwMismatch'); hint.className = 'field-hint error';   inp.className = 'error'; }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>${t('loginLoading')}`;
  hideAlert('loginAlert');
  try {
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id: document.getElementById('loginId').value, password: document.getElementById('loginPw').value }) });
    const data = await res.json();
    if (res.ok) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); window.location.href = '/pages/hub.html'; }
    else        { showAlert('loginAlert', 'error', data.message); }
  } catch { showAlert('loginAlert', 'error', t('errServerCheck')); }
  finally { btn.disabled = false; btn.innerHTML = t('btnLogin'); }
}

async function handleRegister(e) {
  e.preventDefault();
  const pw = document.getElementById('regPw').value;
  const cf = document.getElementById('regPwConfirm').value;
  if (pw !== cf)     { showAlert('registerAlert', 'error', t('errPwMismatch')); return; }
  if (pw.length < 8) { showAlert('registerAlert', 'error', t('errPwShort'));   return; }
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>${t('registerLoading')}`;
  hideAlert('registerAlert');
  try {
    const res  = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id: document.getElementById('regId').value, nickname: document.getElementById('regNick').value, password: pw }) });
    const data = await res.json();
    if (res.ok) { showAlert('registerAlert', 'success', t('registerSuccess')); setTimeout(() => switchTab('login'), 1500); }
    else        { showAlert('registerAlert', 'error', data.message); }
  } catch { showAlert('registerAlert', 'error', t('errNoServer')); }
  finally { btn.disabled = false; btn.innerHTML = t('btnRegister'); }
}

// ── Theme ──────────────────────────────────────────
function applyTheme() {
  const theme = localStorage.getItem('nexus_theme') || 'dark';
  document.documentElement.classList.toggle('light', theme === 'light');
  document.getElementById('btnTheme').textContent = theme === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const next = (localStorage.getItem('nexus_theme') || 'dark') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('nexus_theme', next);
  applyTheme();
}

// Init
if (localStorage.getItem('token')) window.location.href = '/pages/hub.html';
applyLang();
applyTheme();
</script>
</body>
</html>
